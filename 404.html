<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · Nysterys Media</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black:   #080808;
      --surface: #111111;
      --border:  #1e1e1e;
      --orange:  #ff5c00;
      --orange2: #ff8c42;
      --white:   #f5f5f5;
      --muted:   #888888;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Grain texture overlay: matches global.css */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.35;
    }

    /* ── Navigation ─────────────────────────────────────────────── */

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(8, 8, 8, 0.95), transparent);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-logo span { color: var(--orange); }

    /* ── Main ───────────────────────────────────────────────────── */

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem 4rem;
      text-align: center;
      animation: fade-up 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 80ms;
    }

    .error-label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 2rem;
    }

    /* ── 404 glitch hero ────────────────────────────────────────── */

    .hero-404 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(8rem, 28vw, 22rem);
      line-height: 0.85;
      letter-spacing: 0.04em;
      color: var(--white);
      position: relative;
      user-select: none;
      display: block;
      margin-bottom: 2.5rem;
    }

    /* Two glitch layers: hidden by default via clip-path, briefly revealed */
    .hero-404::before,
    .hero-404::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: inherit;
      line-height: inherit;
      letter-spacing: inherit;
    }

    .hero-404::before {
      color: var(--orange);
      animation: glitch-a 7s steps(1) infinite;
    }

    .hero-404::after {
      color: rgba(245, 245, 245, 0.8);
      animation: glitch-b 7s steps(1) infinite;
      animation-delay: 60ms;
    }

    /* Orange layer: 3 quick frames ~490ms to 700ms into each 7s cycle */
    @keyframes glitch-a {
      0%, 90%, 100% { clip-path: inset(0 0 100% 0); transform: translateX(0); }
      91%            { clip-path: inset(14% 0 58% 0); transform: translateX(-7px); }
      92%            { clip-path: inset(67% 0 7% 0);  transform: translateX(5px); }
      93%            { clip-path: inset(37% 0 41% 0); transform: translateX(-3px); }
      94%            { clip-path: inset(0 0 100% 0);  transform: translateX(0); }
    }

    /* White offset layer: offset frames, different slices */
    @keyframes glitch-b {
      0%, 90%, 100% { clip-path: inset(0 0 100% 0); transform: translateX(0); }
      91%            { clip-path: inset(59% 0 11% 0); transform: translateX(6px); }
      92%            { clip-path: inset(23% 0 51% 0); transform: translateX(-5px); }
      93%            { clip-path: inset(0 0 100% 0);  transform: translateX(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-404::before,
      .hero-404::after { animation: none; clip-path: inset(0 0 100% 0); }
      main { animation: none; }
    }

    /* ── Divider ────────────────────────────────────────────────── */

    .divider {
      width: 100%;
      max-width: 480px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--orange), transparent);
      opacity: 0.3;
      margin-bottom: 2.5rem;
    }

    /* ── Message ────────────────────────────────────────────────── */

    .message {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--muted);
      max-width: 40ch;
      margin-bottom: 3rem;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* ── CTA ────────────────────────────────────────────────────── */

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--white);
      border: 1px solid var(--border);
      padding: 0.85rem 2rem;
      transition: border-color 0.25s, color 0.25s;
    }

    .cta:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .cta .arrow {
      display: inline-block;
      transition: transform 0.25s;
    }

    .cta:hover .arrow {
      transform: translateX(-4px);
    }

    /* ── Footer ─────────────────────────────────────────────────── */

    footer {
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      color: var(--muted);
    }
    .footer-logo span { color: var(--orange); }

    .footer-copy {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* ── Entrance ───────────────────────────────────────────────── */

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ─────────────────────────────────────────────────── */

    @media (max-width: 640px) {
      nav    { padding: 1.25rem 1.5rem; }
      main   { padding: 7rem 1.5rem 3rem; }
      footer {
        padding: 1.5rem;
        flex-direction: column;
        gap: 0.5rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">NYST<span>ERYS</span> MEDIA</a>
  </nav>

  <main>
    <p class="error-label">Error · 404</p>

    <span class="hero-404">404</span>

    <div class="divider"></div>

    <p class="message">This page has been moved, removed,<br>or never existed.</p>

    <a href="/" class="cta">
      <span class="arrow">←</span>
      Return Home
    </a>
  </main>

  <footer>
    <span class="footer-logo">NYST<span>ERYS</span> MEDIA</span>
    <span class="footer-copy">© 2026 Nysterys Media LLC</span>
  </footer>

</body>
</html>
