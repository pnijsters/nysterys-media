<html lang="en">
<head>

  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Roster · Kym &amp; Mys | Nysterys Media</title>
  <meta name="theme-color" content="#080808" />

  <!-- Fonts -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&amp;display=swap" />

  <style>
/* ─── Reset ─────────────────────────────────────────── */

    /* ─── Design tokens ──────────────────────────────────── */

    /* ─── Base ───────────────────────────────────────────── */

    /* Grain overlay */

    /* ─── Navigation ─────────────────────────────────────── */

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--orange);
      text-decoration: none;
      border: 1px solid var(--orange);
      padding: 0.5rem 1.25rem;
      transition: background 0.2s, color 0.2s;
    }

    .nav-back:hover {
      background: var(--orange);
      color: var(--black);
    }

    .nav-back svg {
      width: 12px;
      height: 12px;
    }

    /* ─── Hero ───────────────────────────────────────────── */
    .creator-hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
    }

    .hero-photo-wrap {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero-photo-wrap img {
      width: 100%;
      height: 115%; /* extra height for parallax travel */
      object-fit: cover;
      object-position: top;
      display: block;
      filter: brightness(0.85);
      will-change: transform;
      transform-origin: top center;
    }

    /* Gradient to blend photo into the dark right panel */
    .hero-photo-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right,  transparent 60%, var(--black) 100%),
        linear-gradient(to top,    var(--black) 0%,  transparent 30%);
    }

    .hero-info {
      padding: 8rem 4rem 5rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .hero-tag {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s forwards;
    }

    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 10vw, 9rem);
      line-height: 0.9;
      letter-spacing: 0.03em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.35s forwards;
    }

    .hero-bio {
      font-size: 1rem;
      line-height: 1.8;
      color: #aaaaaa;
      max-width: 460px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.5s forwards;
    }

    /* Followers / likes / engagement row */
    .hero-stats {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.65s forwards;
    }

    .hero-stat-val {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: var(--orange);
      line-height: 1;
    }

    .hero-stat-lbl {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-socials {
      display: flex;
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.8s forwards;
    }

    .hero-social {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .hero-social:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .hero-social svg {
      width: 13px;
      height: 13px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Divider ─────────────────────────────────────────── */

    /* ─── Audience section ────────────────────────────────── */
    .audience {
      padding: 6rem 3rem 7rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.04em;
    }

    /* ─── Charts grid ─────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.3s;
    }

    .chart-card:hover {
      border-color: rgba(255, 92, 0, 0.4);
    }

    /* Orange top bar on hover */
    .chart-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(to right, var(--orange), var(--orange2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .chart-card:hover::before {
      transform: scaleX(1);
    }

    .chart-title {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 1.75rem;
    }

    /* ─── Gender donut chart ──────────────────────────────── */
    .donut-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
    }

    .donut-svg {
      width: 140px;
      height: 140px;
      /* rotate so the first segment starts at the top */
      transform: rotate(-90deg);
    }

    .donut-legend {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .legend-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
    }

    .legend-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      color: #aaaaaa;
    }

    .legend-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--orange);
    }

    /* ─── Age distribution bars ───────────────────────────── */
    .age-bars {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .age-row {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .age-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
    }

    .age-meta-label {
      color: var(--muted);
    }

    .age-meta-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      color: var(--white);
    }

    .bar-track {
      height: 4px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background: linear-gradient(to right, var(--orange), var(--orange2));
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─── Country bars ────────────────────────────────────── */
    .country-bars {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .country-row {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .country-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
    }

    .country-name {
      color: var(--white);
    }

    .country-pct {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      color: var(--orange);
    }

    /* ─── Footer ──────────────────────────────────────────── */

    .rc-error {
      padding: 4rem;
      color: var(--muted);
    }

    /* ─── Responsive ──────────────────────────────────────── */
    @media (max-width: 900px) {

      .creator-hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .hero-photo-wrap {
        height: 60vw;
        min-height: 280px;
      }

      /* On mobile the photo sits above, so adjust gradient */
      .hero-photo-overlay {
        background: linear-gradient(to top, var(--black) 0%, transparent 50%);
      }

      .hero-info {
        padding: 2.5rem 1.5rem 3rem;
      }

      .charts-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .audience {
        padding: 4rem 1.5rem 5rem;
      }

    }
  </style>

<body>

  <!-- ─── Navigation ──────────────────────────────────────── -->
  <nav>
    <a class="nav-logo" href="/">NYS<span>T</span>ERYS</a>
    <a class="nav-back" href="/#roster">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M19 12H5M12 5l-7 7 7 7" />
      </svg>
      All Creators
    </a>
  </nav>

  <!-- ─── Creator hero ─────────────────────────────────────── -->
  <section class="creator-hero">
    <div class="hero-photo-wrap">
      <img id="creator-photo" alt="Creator profile photo" hidden />
      <div class="hero-photo-overlay" aria-hidden="true"></div>
    </div>
    <div class="hero-info">
      <p class="hero-tag"  id="creator-tag"></p>
      <h1 class="hero-name" id="creator-name"></h1>
      <p class="hero-bio"  id="creator-bio"></p>
      <div class="hero-stats" id="creator-stats"></div>
      <div class="hero-socials" id="creator-socials"></div>
    </div>
  </section>

  <div class="divider" role="separator"></div>

  <!-- ─── Audience insights ────────────────────────────────── -->
  <section class="audience">
    <div class="section-header">
      <span class="section-label">Analytics</span>
      <h2 class="section-title">Audience Insights</h2>
    </div>

    <div class="charts-grid">

      <!-- Gender split -->
      <div class="chart-card" id="card-gender">
        <p class="chart-title">Gender Split</p>
        <div class="donut-wrap">
          <svg class="donut-svg" viewBox="0 0 36 36" id="donut-svg" aria-label="Gender distribution donut chart" role="img"></svg>
          <div class="donut-legend" id="gender-legend"></div>
        </div>
      </div>

      <!-- Age distribution -->
      <div class="chart-card" id="card-age">
        <p class="chart-title">Age Distribution</p>
        <div class="age-bars" id="age-bars"></div>
      </div>

      <!-- Top countries -->
      <div class="chart-card" id="card-geo">
        <p class="chart-title">Top Countries</p>
        <div class="country-bars" id="country-bars"></div>
      </div>

    </div>
  </section>

  <div class="divider" role="separator"></div>

  <!-- ─── Footer ────────────────────────────────────────────── -->
  <footer>
    <div class="footer-logo">NYS<span>T</span>ERYS MEDIA LLC</div>
    <div class="footer-copy">&copy; 2026 Nysterys Media LLC. All rights reserved.</div>
  </footer>

  <!-- ─── Scripts ───────────────────────────────────────────── -->

  <script>
    // GENDER_COLORS, buildDonut, buildGenderLegend, animateCounter live in site/utils.js.

    // Build age distribution horizontal bars
    function buildAgeBars(data) {
      var maxValue = Math.max.apply(null, data.map(function (d) { return d.value; }));
      var el = document.getElementById('age-bars');
      el.innerHTML = data.map(function (bracket) {
        var widthPct = (bracket.value / maxValue) * 100;
        return '<div class="age-row">'
          + '<div class="age-meta">'
          +   '<span class="age-meta-label">' + bracket.label + '</span>'
          +   '<span class="age-meta-value">' + bracket.value + '%</span>'
          + '</div>'
          + '<div class="bar-track">'
          +   '<div class="bar-fill" data-width="' + widthPct + '"></div>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    // Build top countries horizontal bars
    function buildCountryBars(data) {
      var maxValue = data[0].value; // already sorted descending
      var el = document.getElementById('country-bars');
      el.innerHTML = data.map(function (country) {
        var widthPct = (country.value / maxValue) * 100;
        return '<div class="country-row">'
          + '<div class="country-meta">'
          +   '<span class="country-name">' + country.label + '</span>'
          +   '<span class="country-pct">' + country.value + '%</span>'
          + '</div>'
          + '<div class="bar-track">'
          +   '<div class="bar-fill" data-width="' + widthPct + '"></div>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    // Animate bars to their target width when the card scrolls into view
    var barObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.querySelectorAll('.bar-fill').forEach(function (bar) {
            bar.style.width = bar.dataset.width + '%';
          });
          barObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.2 });

    // Fade-in chart cards as they scroll into view
    var cardObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.style.opacity = '1';
          entry.target.style.transform = 'translateY(0)';
        }
      });
    }, { threshold: 0.15 });

    /* ── Parallax on hero photo ── */
    var heroImg = document.getElementById('creator-photo');
    window.addEventListener('scroll', function() {
      if (heroImg) heroImg.style.transform = 'translateY(' + (window.scrollY * 0.28) + 'px)';
    }, { passive: true });

    /* ── Stat counter animation ── */
    // animateCounter lives in site/utils.js (shared by every page).

    // Read creator id from the URL query string (e.g. creator.html?id=mys)
    var params = new URLSearchParams(window.location.search);
    var creatorId = params.get('id');

    loadSiteData()
      .then(function (data) {
        var creator = data.roster.find(function (c) { return c.id === creatorId; });

        if (!creator) {
          document.body.innerHTML = '<p class="rc-error">Creator not found.</p>';
          return;
        }

        // Update page title
        document.title = creator.name + ' · Nysterys Media';

        // Hero fields
        var photo = document.getElementById('creator-photo');
        // Stay hidden until a real photo loads, so a missing src never shows a broken-image box.
        photo.onerror = function () { photo.hidden = true; };
        photo.src = creator.photo;
        photo.alt = creator.name;
        photo.hidden = false;

        document.getElementById('creator-tag').textContent  = creator.tag;
        document.getElementById('creator-name').textContent = creator.name;
        document.getElementById('creator-bio').textContent  = creator.bio;

        // Stats: followers, likes, engagement rate, with counter animation
        var statsEl = document.getElementById('creator-stats');
        statsEl.innerHTML =
          '<div>'
          +   '<span class="hero-stat-val" id="stat-followers"></span>'
          +   '<span class="hero-stat-lbl">Followers</span>'
          + '</div>'
          + '<div>'
          +   '<span class="hero-stat-val" id="stat-likes"></span>'
          +   '<span class="hero-stat-lbl">Likes</span>'
          + '</div>'
          + '<div>'
          +   '<span class="hero-stat-val" id="stat-eng"></span>'
          +   '<span class="hero-stat-lbl">Eng. Rate</span>'
          + '</div>';
        // Slight delay so the hero animation plays first
        setTimeout(function() {
          animateCounter(document.getElementById('stat-followers'), creator.followers,    900);
          animateCounter(document.getElementById('stat-likes'),     creator.likes,        1100);
          animateCounter(document.getElementById('stat-eng'),       creator.engagementRate, 700);
        }, 400);

        // Social links
        var socialsEl = document.getElementById('creator-socials');
        socialsEl.innerHTML = Object.entries(creator.socials).map(function (entry) {
          var platform = entry[0];
          var url      = entry[1];
          return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="hero-social" aria-label="' + platform + '">'
            + ICONS[platform]
            + ' ' + platform.toUpperCase()
            + '</a>';
        }).join('');

        // Build the three charts
        buildDonut('donut-svg', creator.audience.gender);
        buildGenderLegend('gender-legend', creator.audience.gender);
        buildAgeBars(creator.audience.age);
        buildCountryBars(creator.audience.topCountries);

        // Attach observers to each chart card
        document.querySelectorAll('.chart-card').forEach(function (card) {
          cardObserver.observe(card);
          barObserver.observe(card);
        });
      })
      .catch(function (err) {
        console.error('Could not load site data:', err);
        // Don't leave the profile half-empty: show a quiet, in-theme message.
        document.body.innerHTML = '<p class="rc-error">Couldn\'t load this profile right now. Please refresh the page.</p>';
      });
  </script>

</body>
